name: Performance Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    # Run daily at 2 AM UTC
    - cron: '0 2 * * *'

env:
  GO_VERSION: '1.21'

jobs:
  benchmark:
    name: Performance Benchmarks
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Go
      uses: actions/setup-go@v4
      with:
        go-version: ${{ env.GO_VERSION }}
        
    - name: Cache Go modules
      uses: actions/cache@v3
      with:
        path: ~/go/pkg/mod
        key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-
          
    - name: Install dependencies
      run: |
        cd api && go mod download
        cd collector && go mod download
        cd alerting && go mod download
        
    - name: Run Go benchmarks
      run: |
        echo "Running API benchmarks..."
        cd api && go test -bench=. -benchmem -count=3 ./... | tee api-benchmark.txt
        
        echo "Running collector benchmarks..."
        cd collector && go test -bench=. -benchmem -count=3 ./... | tee collector-benchmark.txt
        
        echo "Running alerting benchmarks..."
        cd alerting && go test -bench=. -benchmem -count=3 ./... | tee alerting-benchmark.txt
        
    - name: Store benchmark result
      uses: benchmark-action/github-action-benchmark@v1
      with:
        tool: 'go'
        output-file-path: api-benchmark.txt
        github-token: ${{ secrets.GITHUB_TOKEN }}
        auto-push: true
        comment-on-alert: true
        alert-threshold: '200%'
        fail-on-alert: true

  load-test:
    name: Load Testing
    runs-on: ubuntu-latest
    needs: benchmark
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Docker Compose
      run: |
        docker compose version
        
    - name: Start services
      run: |
        docker compose up -d clickhouse kafka
        sleep 30
        
    - name: Run database migrations
      run: |
        cat migrations/001_metrics.sql | docker exec -i clickhouse clickhouse-client --database=observability
        cat migrations/002_logs.sql | docker exec -i clickhouse clickhouse-client --database=observability
        cat migrations/003_traces.sql | docker exec -i clickhouse clickhouse-client --database=observability
        
    - name: Build and start services
      run: |
        docker compose build
        docker compose up -d api collector alerting
        sleep 60
        
    - name: Install Apache Bench
      run: sudo apt-get update && sudo apt-get install -y apache2-utils
      
    - name: Run load tests
      run: |
        echo "Testing API endpoints..."
        
        # Health check
        curl -f http://localhost:8080/health || exit 1
        
        # Load test metrics endpoint
        ab -n 1000 -c 10 http://localhost:8080/metrics || true
        
        # Load test API endpoints
        ab -n 500 -c 5 http://localhost:8080/api/metrics || true
        ab -n 500 -c 5 http://localhost:8080/api/logs || true
        ab -n 500 -c 5 http://localhost:8080/api/traces || true
        
    - name: Collect performance metrics
      run: |
        echo "Collecting system metrics..."
        docker stats --no-stream > docker-stats.txt
        cat docker-stats.txt
        
    - name: Cleanup
      run: |
        docker compose down -v
        docker system prune -f

  memory-profiling:
    name: Memory Profiling
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Go
      uses: actions/setup-go@v4
      with:
        go-version: ${{ env.GO_VERSION }}
        
    - name: Run memory profiling
      run: |
        echo "Running memory profiling tests..."
        
        # API memory profiling
        cd api
        go test -memprofile=api.memprof -bench=. ./...
        go tool pprof -text api.memprof > api-memory.txt
        
        # Collector memory profiling  
        cd ../collector
        go test -memprofile=collector.memprof -bench=. ./...
        go tool pprof -text collector.memprof > collector-memory.txt
        
        # Alerting memory profiling
        cd ../alerting  
        go test -memprofile=alerting.memprof -bench=. ./...
        go tool pprof -text alerting.memprof > alerting-memory.txt
        
    - name: Upload memory profiles
      uses: actions/upload-artifact@v3
      with:
        name: memory-profiles
        path: |
          api/api-memory.txt
          api/api.memprof
          collector/collector-memory.txt
          collector/collector.memprof
          alerting/alerting-memory.txt
          alerting/alerting.memprof
        retention-days: 30
